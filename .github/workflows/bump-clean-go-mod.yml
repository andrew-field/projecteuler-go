name: Bump clean go mod

on:
  schedule:
    - cron: "40 0 */7 * *"

  # Allows you to run this workflow manually from the Actions tab.
  workflow_dispatch:

# Permissions for the GITHUB_TOKEN.
permissions: {}

jobs:
  bump_clean_go_mod:
    name: Call bump clean go mod workflow
    permissions:
      contents: read # The contents: read is not necessary for a public repository but it is necessary for the reusable workflow.
    uses: andrew-field/reusable-workflows/.github/workflows/bump-clean-go-mod.yml@0e8a348c69366992354938d2bb2345b51d5e79c9 # v1.5.17

    # Needs to inherit more than the GITHUB_TOKEN to trigger GitHub Actions CI checks. APP_CLIENT_ID and APP_PRIVATE_KEY (for the GitHub app) need to be added as a secret.
    secrets:
      APP_CLIENT_ID: ${{ secrets.APP_CLIENT_ID }}
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
