name: Super Linter

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

  # Allows you to run this workflow manually from the Actions tab.
  workflow_dispatch:

# Permissions for the GITHUB_TOKEN.
permissions: {}

jobs:
  lint:
    name: Lint code base
    permissions:
      contents: read # The contents: read is not necessary for a public repository but it is necessary for the reusable workflow, which has it as a requirement.
      packages: read
      issues: write
      pull-requests: write
      statuses: write
    uses: andrew-field/reusable-workflows/.github/workflows/super-linter.yml@747e0a31c3420b738598f23ba8f4dec8e548aaba # v1.5.19
    with:
      regex_exclude: p022_names.txt # Exclude this text file because there are no spelling mistakes.
