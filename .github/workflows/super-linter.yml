name: Super Linter

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

  # Allows you to run this workflow manually from the Actions tab.
  workflow_dispatch:

# Permissions for the GITHUB_TOKEN.
permissions: {}

jobs:
  lint:
    name: Lint code base
    permissions:
      contents: read # The contents: read is not necessary for a public repository but it is necessary for the reusable workflow.
    uses: andrew-field/reusable-workflows/.github/workflows/super-linter.yml@0e8a348c69366992354938d2bb2345b51d5e79c9 # v1.5.17
    with:
      regex_exclude: p022_names.txt # Exclude this text file because there are no spelling mistakes.
